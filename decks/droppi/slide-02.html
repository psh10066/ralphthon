<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 720pt;
      height: 405pt;
      font-family: 'Pretendard', sans-serif;
      background: #2d2a26;
      padding: 48pt;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }
  </style>
</head>
<body>
  <!-- 섹션 태그 -->
  <div style="display: flex; justify-content: space-between; align-items: center;">
    <p style="display: inline-block; padding: 4pt 10pt; background: #c45a3b; color: #fff; border-radius: 4pt; font-size: 8pt; font-weight: 600;">PROBLEM</p>
    <p style="font-size: 10pt; color: #6b6560;">02</p>
  </div>

  <!-- 메인 -->
  <div>
    <h2 style="font-size: 28pt; font-weight: 600; color: #ffffff; line-height: 1.4; letter-spacing: -0.01em;">
      사람들은 뭘 좋아하는지는 안다.<br>
      왜 좋아하는지는 모른다.
    </h2>
    <div style="margin-top: 32pt; display: flex; gap: 24pt;">
      <div style="flex: 1; background: rgba(255,255,255,0.06); border-radius: 8pt; padding: 20pt;">
        <p style="font-size: 32pt; font-weight: 600; color: #c45a3b;">200장</p>
        <p style="font-size: 11pt; color: #888; margin-top: 6pt;">핀터레스트 저장</p>
      </div>
      <div style="flex: 1; background: rgba(255,255,255,0.06); border-radius: 8pt; padding: 20pt;">
        <p style="font-size: 32pt; font-weight: 600; color: #c45a3b;">3,000장</p>
        <p style="font-size: 11pt; color: #888; margin-top: 6pt;">카메라롤 사진</p>
      </div>
      <div style="flex: 1; background: rgba(255,255,255,0.06); border-radius: 8pt; padding: 20pt;">
        <p style="font-size: 32pt; font-weight: 600; color: #c45a3b;">4글자</p>
        <p style="font-size: 11pt; color: #888; margin-top: 6pt;">MBTI가 나의 전부</p>
      </div>
    </div>
  </div>

  <!-- 한 줄 -->
  <p style="font-size: 14pt; color: #6b6560; font-weight: 300;">
    다 "나"인데 — 아무도 그걸 읽어주지 않았다.
  </p>
</body>
</html>
