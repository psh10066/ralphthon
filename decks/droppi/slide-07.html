<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 720pt;
      height: 405pt;
      font-family: 'Pretendard', sans-serif;
      background: #ffffff;
      padding: 40pt 48pt;
      display: flex;
      flex-direction: column;
    }
  </style>
</head>
<body>
  <!-- 헤더 -->
  <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24pt;">
    <div style="display: flex; align-items: center; gap: 12pt;">
      <p style="display: inline-block; padding: 4pt 10pt; background: #c45a3b; color: #fff; border-radius: 4pt; font-size: 8pt; font-weight: 600;">VALIDATION</p>
      <h2 style="font-size: 22pt; font-weight: 600; color: #2d2a26;">28세션, 2개월. 직접 썼다.</h2>
    </div>
    <p style="font-size: 10pt; color: #999;">07</p>
  </div>

  <!-- 전환 사례 3개 -->
  <div style="flex: 1; display: flex; flex-direction: column; gap: 12pt;">
    <div style="flex: 1; background: #faf8f5; border-radius: 10pt; padding: 18pt 24pt; display: flex; align-items: center; gap: 20pt;">
      <div style="width: 28pt; height: 28pt; background: #c45a3b; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0;">
        <p style="color: #fff; font-size: 12pt; font-weight: 600;">1</p>
      </div>
      <div>
        <div style="display: flex; align-items: center; gap: 10pt; margin-bottom: 4pt;">
          <p style="font-size: 13pt; color: #6b6560;">"속도를 늦춰야 빨라진다"</p>
          <p style="font-size: 13pt; color: #ddd8d0;">→</p>
          <p style="font-size: 13pt; color: #2d2a26; font-weight: 600;">"준비 안 된 채로 꺼내는 연습이 필요해"</p>
        </div>
        <p style="font-size: 10pt; color: #999;">남의 글이 나의 언어로 바뀐 순간</p>
      </div>
    </div>

    <div style="flex: 1; background: #faf8f5; border-radius: 10pt; padding: 18pt 24pt; display: flex; align-items: center; gap: 20pt;">
      <div style="width: 28pt; height: 28pt; background: #c45a3b; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0;">
        <p style="color: #fff; font-size: 12pt; font-weight: 600;">2</p>
      </div>
      <div>
        <div style="display: flex; align-items: center; gap: 10pt; margin-bottom: 4pt;">
          <p style="font-size: 13pt; color: #6b6560;">블로그 글 3편</p>
          <p style="font-size: 13pt; color: #ddd8d0;">→</p>
          <p style="font-size: 13pt; color: #2d2a26; font-weight: 600;">업무 전제가 통째로 전환</p>
        </div>
        <p style="font-size: 10pt; color: #999;">글이 촉매, 발견은 안에서 일어남</p>
      </div>
    </div>

    <div style="flex: 1; background: #faf8f5; border-radius: 10pt; padding: 18pt 24pt; display: flex; align-items: center; gap: 20pt;">
      <div style="width: 28pt; height: 28pt; background: #c45a3b; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0;">
        <p style="color: #fff; font-size: 12pt; font-weight: 600;">3</p>
      </div>
      <div>
        <div style="display: flex; align-items: center; gap: 10pt; margin-bottom: 4pt;">
          <p style="font-size: 13pt; color: #6b6560;">경쟁사 리뷰</p>
          <p style="font-size: 13pt; color: #ddd8d0;">→</p>
          <p style="font-size: 13pt; color: #2d2a26; font-weight: 600;">제품 프레임 재정의</p>
        </div>
        <p style="font-size: 10pt; color: #999;">외부 자극이 내 일의 프레임을 바꿈</p>
      </div>
    </div>
  </div>

  <!-- 인용 -->
  <div style="margin-top: 16pt; padding-top: 12pt; border-top: 1px solid #f0ebe3;">
    <p style="font-size: 13pt; color: #2d2a26; font-weight: 400; font-style: italic;">
      "글은 촉매였고, 발견은 나 안에서 일어났다."
    </p>
  </div>
</body>
</html>
