<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 720pt;
      height: 405pt;
      font-family: 'Pretendard', sans-serif;
      background: #ffffff;
      display: grid;
      grid-template-columns: 1fr 1fr;
    }
  </style>
</head>
<body>
  <!-- 왼쪽: 글 → 질문 변환 -->
  <div style="background: #2d2a26; padding: 40pt; display: flex; flex-direction: column; justify-content: center;">
    <p style="display: inline-block; padding: 4pt 10pt; background: #c45a3b; color: #fff; border-radius: 4pt; font-size: 8pt; font-weight: 600; align-self: flex-start; margin-bottom: 24pt;">DEPTH</p>

    <p style="font-size: 10pt; color: #6b6560; margin-bottom: 8pt;">넣은 글</p>
    <p style="font-size: 16pt; color: #ffffff; font-weight: 500; line-height: 1.5; margin-bottom: 24pt;">
      "속도를 늦춰야 빨라진다"
    </p>

    <p style="font-size: 10pt; color: #6b6560; margin-bottom: 8pt;">돌아온 질문</p>
    <p style="font-size: 14pt; color: #c45a3b; font-weight: 400; line-height: 1.5;">
      "이 문장에 걸렸다면,<br>지금 뭘 빠르게 하려다 막혀있어?"
    </p>
  </div>

  <!-- 오른쪽: 전환 사례 -->
  <div style="padding: 40pt; display: flex; flex-direction: column; justify-content: center;">
    <h2 style="font-size: 22pt; font-weight: 600; color: #2d2a26; margin-bottom: 24pt; line-height: 1.3;">
      글의 언어가<br>나의 언어로 바뀐다
    </h2>

    <div style="margin-bottom: 20pt;">
      <p style="font-size: 10pt; color: #6b6560; margin-bottom: 6pt;">글이 말한 것</p>
      <p style="font-size: 13pt; color: #2d2a26; line-height: 1.6;">"Closer 근육이 필요하다"</p>
    </div>

    <div style="width: 24pt; height: 1pt; background: #c45a3b; margin-bottom: 20pt;"></div>

    <div>
      <p style="font-size: 10pt; color: #6b6560; margin-bottom: 6pt;">내가 발견한 것</p>
      <p style="font-size: 15pt; color: #2d2a26; font-weight: 600; line-height: 1.6;">
        "준비 안 된 채로 꺼내는<br>연습이 필요해."
      </p>
    </div>

    <p style="font-size: 11pt; color: #6b6560; margin-top: 24pt; line-height: 1.6;">
      사진에서 읽은 "나"와<br>글에서 발견한 "나"가 하나로 쌓인다.
    </p>
  </div>
</body>
</html>
