<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 720pt;
      height: 405pt;
      font-family: 'Pretendard', sans-serif;
      background: #ffffff;
      padding: 40pt 48pt;
      display: flex;
      flex-direction: column;
    }
  </style>
</head>
<body>
  <!-- 헤더 -->
  <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 28pt;">
    <div style="display: flex; align-items: center; gap: 12pt;">
      <p style="display: inline-block; padding: 4pt 10pt; background: #c45a3b; color: #fff; border-radius: 4pt; font-size: 8pt; font-weight: 600;">SOLUTION</p>
      <h2 style="font-size: 22pt; font-weight: 600; color: #2d2a26;">진단이 아니라 관찰</h2>
    </div>
    <p style="font-size: 10pt; color: #999;">04</p>
  </div>

  <!-- 플로우 -->
  <div style="flex: 1; display: flex; flex-direction: column; gap: 16pt;">
    <!-- 흐름도 -->
    <div style="display: flex; align-items: center; gap: 12pt; margin-bottom: 8pt;">
      <div style="background: #f0ebe3; border-radius: 8pt; padding: 12pt 20pt;">
        <p style="font-size: 12pt; font-weight: 600; color: #2d2a26;">뭐든 하나 drop</p>
        <p style="font-size: 9pt; color: #6b6560;">사진 · 글 · 링크 · 메모</p>
      </div>
      <p style="font-size: 16pt; color: #ddd8d0;">→</p>
      <div style="background: #f0ebe3; border-radius: 8pt; padding: 12pt 20pt;">
        <p style="font-size: 12pt; font-weight: 600; color: #2d2a26;">AI가 읽는다</p>
        <p style="font-size: 9pt; color: #6b6560;">내용 + 무드를 같이</p>
      </div>
      <p style="font-size: 16pt; color: #ddd8d0;">→</p>
      <div style="background: #f0ebe3; border-radius: 8pt; padding: 12pt 20pt;">
        <p style="font-size: 12pt; font-weight: 600; color: #2d2a26;">인사이트 + 질문</p>
        <p style="font-size: 9pt; color: #6b6560;">반응하면 대화 시작</p>
      </div>
    </div>

    <!-- 에센스 결과 예시 -->
    <div style="background: #2d2a26; border-radius: 12pt; padding: 28pt; flex: 1; display: flex; flex-direction: column; justify-content: center;">
      <p style="font-size: 10pt; color: #6b6560; margin-bottom: 12pt;">에센스 결과 예시</p>
      <p style="font-size: 24pt; font-weight: 500; color: #ffffff; line-height: 1.4; letter-spacing: -0.01em;">
        "손 닿는 곳의 아늑함을 모으는 사람"
      </p>
      <div style="margin-top: 20pt; display: flex; gap: 24pt;">
        <div>
          <p style="font-size: 9pt; color: #6b6560;">관찰</p>
          <p style="font-size: 12pt; color: #888; margin-top: 4pt;">사진이 전부 가까이에 있는 것들이거든요.</p>
        </div>
        <div>
          <p style="font-size: 9pt; color: #6b6560;">열린 질문</p>
          <p style="font-size: 12pt; color: #c45a3b; margin-top: 4pt;">뭐가 끌렸어요?</p>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
