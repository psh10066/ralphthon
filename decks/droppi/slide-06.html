<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 720pt;
      height: 405pt;
      font-family: 'Pretendard', sans-serif;
      background: #faf8f5;
      padding: 40pt 48pt;
      display: flex;
      flex-direction: column;
    }
  </style>
</head>
<body>
  <!-- 헤더 -->
  <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 28pt;">
    <div style="display: flex; align-items: center; gap: 12pt;">
      <p style="display: inline-block; padding: 4pt 10pt; background: #c45a3b; color: #fff; border-radius: 4pt; font-size: 8pt; font-weight: 600;">MOAT</p>
      <h2 style="font-size: 22pt; font-weight: 600; color: #2d2a26;">축적 = 해자</h2>
    </div>
    <p style="font-size: 10pt; color: #999;">06</p>
  </div>

  <!-- 비교 테이블 -->
  <div style="flex: 1; display: flex; flex-direction: column; gap: 12pt;">
    <!-- 헤더 행 -->
    <div style="display: grid; grid-template-columns: 100pt 1fr 1fr 1fr; gap: 8pt;">
      <div></div>
      <div style="background: #f0ebe3; border-radius: 6pt; padding: 10pt 14pt; text-align: center;">
        <p style="font-size: 11pt; font-weight: 500; color: #6b6560;">MBTI</p>
      </div>
      <div style="background: #f0ebe3; border-radius: 6pt; padding: 10pt 14pt; text-align: center;">
        <p style="font-size: 11pt; font-weight: 500; color: #6b6560;">ChatGPT</p>
      </div>
      <div style="background: #2d2a26; border-radius: 6pt; padding: 10pt 14pt; text-align: center;">
        <p style="font-size: 11pt; font-weight: 600; color: #c45a3b;">droppi</p>
      </div>
    </div>
    <!-- 입력 -->
    <div style="display: grid; grid-template-columns: 100pt 1fr 1fr 1fr; gap: 8pt;">
      <p style="font-size: 10pt; color: #6b6560; padding: 10pt 0; font-weight: 500;">입력</p>
      <p style="font-size: 12pt; color: #2d2a26; padding: 10pt 14pt;">선택지</p>
      <p style="font-size: 12pt; color: #2d2a26; padding: 10pt 14pt;">텍스트</p>
      <p style="font-size: 12pt; color: #2d2a26; padding: 10pt 14pt; font-weight: 600;">사진 + 글 + 메모</p>
    </div>
    <!-- 결과 -->
    <div style="display: grid; grid-template-columns: 100pt 1fr 1fr 1fr; gap: 8pt;">
      <p style="font-size: 10pt; color: #6b6560; padding: 10pt 0; font-weight: 500;">결과</p>
      <p style="font-size: 12pt; color: #2d2a26; padding: 10pt 14pt;">4글자</p>
      <p style="font-size: 12pt; color: #2d2a26; padding: 10pt 14pt;">요약</p>
      <p style="font-size: 12pt; color: #2d2a26; padding: 10pt 14pt; font-weight: 600;">에센스 + 질문</p>
    </div>
    <!-- 10회 후 -->
    <div style="display: grid; grid-template-columns: 100pt 1fr 1fr 1fr; gap: 8pt;">
      <p style="font-size: 10pt; color: #6b6560; padding: 10pt 0; font-weight: 500;">10회 후</p>
      <p style="font-size: 12pt; color: #999; padding: 10pt 14pt;">같은 결과</p>
      <p style="font-size: 12pt; color: #999; padding: 10pt 14pt;">리셋</p>
      <p style="font-size: 12pt; color: #c45a3b; padding: 10pt 14pt; font-weight: 600;">패턴이 보인다</p>
    </div>
    <!-- 30회 후 -->
    <div style="display: grid; grid-template-columns: 100pt 1fr 1fr 1fr; gap: 8pt; background: rgba(196,90,59,0.06); border-radius: 8pt; padding: 4pt 0;">
      <p style="font-size: 10pt; color: #6b6560; padding: 10pt 0 10pt 8pt; font-weight: 500;">30회 후</p>
      <p style="font-size: 12pt; color: #999; padding: 10pt 14pt;">같은 결과</p>
      <p style="font-size: 12pt; color: #999; padding: 10pt 14pt;">불가능</p>
      <p style="font-size: 14pt; color: #c45a3b; padding: 10pt 14pt; font-weight: 700;">변화사가 존재</p>
    </div>
  </div>

  <p style="font-size: 12pt; color: #6b6560; margin-top: 12pt;">
    "나의 변화사"가 존재하는 것. 이게 해자다.
  </p>
</body>
</html>
