<html>
<head>

  <style>

<body>
  <p style="font-size: 10pt; color: #c45a3b; font-weight: 600; letter-spacing: 0.05em; margin-bottom: 24pt;">INSIGHT</p>
  <h2 style="font-size: 30pt; font-weight: 500; color: #2d2a26; letter-spacing: -0.01em; line-height: 1.5; max-width: 520pt;">
    좋아하는 것들이<br>이미 당신을 말하고 있었다.
  </h2>
  <p style="font-size: 14pt; color: #6b6560; margin-top: 28pt; line-height: 1.7; max-width: 440pt;">

    그 끌림에는 패턴이 있다.<br><br>

  </p>

</html>
